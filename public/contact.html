<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>联系我们｜向量跃迁官网｜预约跨境店铺自动化诊断</title>
    <meta name="description" content="联系向量跃迁官网，预约跨境电商智能经营系统、Etsy 自动化运营、AI 商品内容、选品采集、批量刊登、订单履约与客服运营的商务沟通。">
    <link rel="canonical" href="https://vectorleap.xyz/contact">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/vector-leap-icon.png">
    <link rel="stylesheet" href="/styles.css?v=20260531-fastnav">
  </head>
  <body>
    <header class="site-header"></header>
    <main>
      <section class="page-hero contact-hero">
        <p class="eyebrow" data-i18n="nav.contact">联系我们</p>
        <h1 data-i18n="contact.title">预约一次跨境店铺经营诊断</h1>
        <p data-i18n="contact.intro">告诉我们你当前的 Etsy 阶段、店铺数量、发货方式和最想自动化的环节，我们会判断第一版适合先跑通哪条闭环。</p>
      </section>
      <section class="section contact-layout">
        <form class="contact-form" data-contact-form>
          <label><span data-i18n="contact.name">姓名</span><input name="name" required></label>
          <label><span data-i18n="contact.company">公司/个人身份（选填）</span><input name="company"></label>
          <label><span data-i18n="contact.contact">手机号/微信</span><input name="contact" required></label>
          <label><span data-i18n="contact.email">邮箱</span><input name="email" type="email"></label>
          <label><span data-i18n="contact.product">当前阶段/关注能力</span>
            <select name="product" required>
              <option value="" data-i18n="contact.productPlaceholder">请选择</option>
              <option value="跨境电商智能经营系统" data-i18n="products.commerce.name">跨境电商智能经营系统</option>
              <option value="AI 商品内容生产" data-i18n="products.service.name">AI 商品内容生产</option>
              <option value="选品采集与刊登自动化" data-i18n="products.media.name">选品采集与刊登自动化</option>
              <option value="订单履约与店铺运营" data-i18n="products.lexicon.name">订单履约与店铺运营</option>
              <option value="综合咨询" data-i18n="contact.allProducts">还不确定，先综合咨询</option>
            </select>
          </label>
          <label class="full"><span data-i18n="contact.message">需求描述</span><textarea name="message" rows="5" required></textarea></label>
          <button class="button primary" type="submit" data-i18n="contact.submit">提交咨询</button>
          <p class="form-status" data-form-status role="status"></p>
        </form>
        <aside class="contact-card">
          <h2 data-i18n="contact.directTitle">商务对接</h2>
          <p data-i18n="contact.directText">也可以通过微信、邮箱或电话直接联系向量跃迁，我们会尽快回复你的业务咨询。</p>
          <img class="wechat-qr" src="/assets/wechat-qr.png" alt="王晨博微信二维码" loading="lazy" decoding="async">
          <p><strong data-i18n="contact.wechat">微信</strong><br>kaze005</p>
          <p><strong data-i18n="contact.mail">邮箱</strong><br><a href="mailto:wang2797545062@gmail.com">wang2797545062@gmail.com</a></p>
          <p><strong data-i18n="contact.phone">电话</strong><br><a href="tel:+8618814485834">188 1448 5834</a></p>
        </aside>
      </section>
    </main>
    <footer class="site-footer"></footer>
    <script src="/app.js?v=20260531-fastnav"></script>
  </body>
</html>
