<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>联系我们｜向量跃迁官网｜预约AI产品商务沟通</title>
    <meta name="description" content="联系向量跃迁官网，预约 AI 客服报价助手、灵感方舟、AI 词库知识库等企业 AI 产品的商务沟通。">
    <link rel="canonical" href="https://vectorleap.xyz/contact">
    <link rel="icon" type="image/png" href="/assets/favicon.png">
    <link rel="apple-touch-icon" href="/assets/vector-leap-icon.png">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="site-header"></header>
    <main>
      <section class="page-hero contact-hero">
        <p class="eyebrow" data-i18n="nav.contact">联系我们</p>
        <h1 data-i18n="contact.title">预约一次面向业务结果的 AI 沟通</h1>
        <p data-i18n="contact.intro">告诉我们你的行业、产品和客户来源，我们会判断哪类 AI 产品最适合先落地。</p>
      </section>
      <section class="section contact-layout">
        <form class="contact-form" data-contact-form>
          <label><span data-i18n="contact.name">姓名</span><input name="name" required></label>
          <label><span data-i18n="contact.company">公司</span><input name="company" required></label>
          <label><span data-i18n="contact.contact">手机号/微信</span><input name="contact" required></label>
          <label><span data-i18n="contact.email">邮箱</span><input name="email" type="email"></label>
          <label><span data-i18n="contact.product">感兴趣产品</span>
            <select name="product" required>
              <option value="" data-i18n="contact.productPlaceholder">请选择</option>
              <option value="AI客服报价助手" data-i18n="products.service.name">AI客服报价助手</option>
              <option value="灵感方舟" data-i18n="products.media.name">灵感方舟</option>
              <option value="AI词库知识库" data-i18n="products.lexicon.name">AI词库知识库</option>
              <option value="综合咨询" data-i18n="contact.allProducts">综合咨询</option>
            </select>
          </label>
          <label class="full"><span data-i18n="contact.message">需求描述</span><textarea name="message" rows="5" required></textarea></label>
          <button class="button primary" type="submit" data-i18n="contact.submit">提交咨询</button>
          <p class="form-status" data-form-status role="status"></p>
        </form>
        <aside class="contact-card">
          <h2 data-i18n="contact.directTitle">商务对接</h2>
          <p data-i18n="contact.directText">也可以通过微信、邮箱或电话直接联系向量跃迁，我们会尽快回复你的业务咨询。</p>
          <div class="qr-placeholder">VX</div>
          <p><strong data-i18n="contact.wechat">微信</strong><br>kaze005</p>
          <p><strong data-i18n="contact.mail">邮箱</strong><br><a href="mailto:wang2797545062@gmail.com">wang2797545062@gmail.com</a></p>
          <p><strong data-i18n="contact.phone">电话</strong><br><a href="tel:+8618814485834">188 1448 5834</a></p>
          <div class="join-card">
            <h3 data-i18n="careers.title">加入我们</h3>
            <p data-i18n="careers.text">向量跃迁正在寻找对 AI 产品、企业服务和行业数字化感兴趣的伙伴。如果你关注产品、技术、销售或内容增长，欢迎通过微信或邮箱联系我们。</p>
            <a class="button secondary" href="mailto:wang2797545062@gmail.com?subject=加入向量跃迁" data-i18n="careers.cta">联系加入</a>
          </div>
        </aside>
      </section>
    </main>
    <footer class="site-footer"></footer>
    <script src="/app.js"></script>
  </body>
</html>
